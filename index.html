<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AR Illustrations</title>

<!-- Favicon -->
<link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
<link rel="manifest" href="./assets/site.webmanifest">
<meta name="theme-color" content="#D89A5B">

<!-- XR -->
<script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
<script crossorigin="anonymous" src="./external/xr/xr.js" async data-preload-chunks="slam"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

/* ===== SPLASH ===== */

#start-overlay {
  position: fixed;
  inset: 0;
  z-index: 99999;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #F6E3C5;
  overflow: hidden;
  pointer-events: none;
}

/* Gradient */
#gradient-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

#gradient-bg svg {
  width: 120%;
  height: 120%;
}

.shape {
  transform-origin: center;
  opacity: 0.8;
}

.shape1 { animation: move1 28s infinite linear alternate; }
.shape2 { animation: move2 35s infinite linear alternate; }
.shape3 { animation: move3 40s infinite linear alternate; }

@keyframes move1 {
  0% { transform: translate(-20vw,-10vh) scale(1); }
  50% { transform: translate(40vw,30vh) scale(1.3); }
  100% { transform: translate(-20vw,-10vh) scale(1); }
}

@keyframes move2 {
  0% { transform: translate(30vw,20vh) scale(1.2); }
  50% { transform: translate(-40vw,-30vh) scale(0.8); }
  100% { transform: translate(30vw,20vh) scale(1.2); }
}

@keyframes move3 {
  0% { transform: translate(0,40vh) scale(1); }
  50% { transform: translate(40vw,-20vh) scale(1.4); }
  100% { transform: translate(0,40vh) scale(1); }
}

/* Glass */
#glass-layer {
  position: absolute;
  inset: 0;
  backdrop-filter: blur(80px);
  background: rgba(255,255,255,0.08);
  z-index: 1;
  pointer-events: none;
}

/* ===== CONTENT ===== */

#content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  height: 100%;
  padding: 40px 20px 40px;
  box-sizing: border-box;
  pointer-events: auto;
}

#visual-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  flex-grow: 1;
  max-height: 70vh;
}

#splash-art {
  aspect-ratio: 1/1;
  width: min(120vw, 90vh);
  max-width: 512px;
}

#signature {
  aspect-ratio: 1/1;
  width: min(40vw, 30vh);
  max-width: 256px;
}

/* BUTTON STATES */

#start-button {
  margin-top: 20px;
  padding: 16px 36px;
  font-size: 18px;
  background: linear-gradient(135deg, #E6A85C, #C97A3D);
  color: #fff;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  flex-shrink: 0;
  pointer-events: none;
  opacity: 0.5;
  transition: all 0.3s ease;
}

#start-button.active {
  pointer-events: auto;
  opacity: 1;
}

/* Flash */
#flash {
  position: absolute;
  inset: 0;
  background: #fff;
  opacity: 0;
  z-index: 100000;
  transition: opacity 0.6s ease;
}

#flash.active {
  opacity: 1;
}

/* XR */
#xr-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none !important;
}
</style>
</head>

<body>

<script src="bundle.js"></script>

<div id="start-overlay">

  <div id="gradient-bg">
    <svg viewBox="0 0 800 800">
      <defs>
        <filter id="blur">
          <feGaussianBlur stdDeviation="80"/>
        </filter>
        <radialGradient id="g1">
          <stop offset="0%" stop-color="#FFD27A"/>
          <stop offset="100%" stop-color="#E6A85C"/>
        </radialGradient>
        <radialGradient id="g2">
          <stop offset="0%" stop-color="#F6C28B"/>
          <stop offset="100%" stop-color="#D89A5B"/>
        </radialGradient>
        <radialGradient id="g3">
          <stop offset="0%" stop-color="#FFE0A3"/>
          <stop offset="100%" stop-color="#C97A3D"/>
        </radialGradient>
      </defs>

      <g filter="url(#blur)">
        <path class="shape shape1" fill="url(#g1)" d="M300,200 C400,100 600,150 650,300 C700,450 550,600 400,650 C250,700 150,550 150,400 Z"/>
        <path class="shape shape2" fill="url(#g2)" d="M500,100 C650,150 750,300 700,450 C650,600 500,700 350,650 C200,600 150,450 200,300 Z"/>
        <path class="shape shape3" fill="url(#g3)" d="M200,300 C250,200 400,150 500,250 C600,350 550,500 400,550 C250,600 150,500 150,400 Z"/>
      </g>
    </svg>
  </div>

  <div id="glass-layer"></div>

  <div id="content">
    <div id="visual-group">
      <img id="splash-art" src="./assets/splash-art.png">
      <img id="signature" src="./assets/signature.png">
    </div>

    <button id="start-button">Start AR</button>
  </div>

  <div id="flash"></div>

</div>

<canvas id="xr-canvas"></canvas>

<script>
window.addEventListener("load", () => {

  const button = document.getElementById("start-button");
  const overlay = document.getElementById("start-overlay");
  const flash = document.getElementById("flash");

  // ✅ ENABLE BUTTON WHEN XR READY
  const enableButton = () => {
    button.classList.add("active");
  };

  // Case 1: XR already loaded
  if (window.XR8) {
    enableButton();
  }

  // Case 2: XR loads later
  window.addEventListener("xrloaded", enableButton);

  // CLICK
  button.onclick = async function () {

    if (!button.classList.contains("active")) return;

    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      await ctx.resume();
    } catch(e){}

    try {
      if (window.XR8 && XR8.XrController) {
        XR8.XrController.resume();
      }
    } catch(e){}

    flash.classList.add("active");

    setTimeout(() => overlay.style.opacity = "0", 300);
    setTimeout(() => overlay.remove(), 900);
  };

});
</script>

</body>
</html>
