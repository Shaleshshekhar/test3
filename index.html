<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>AR Illustrations</title>
  <meta itemprop="name" content="AR Illustrations">
  <meta name="twitter:title" content="AR Illustrations">
  <meta property="og:title" content="AR Illustrations">
  <meta property="og:site_name" content="AR Illustrations">
  <meta name="description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world.">
  <meta itemprop="description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world.">
  <meta property="og:description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world.">
  <meta name="twitter:description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world.">
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam">
  </script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      background: #000;
    }

    #start-overlay {
      position: absolute;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #fff;
      text-align: center;
      padding: 24px;
    }

    #start-button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      background: #8736d7;
      color: #fff;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    #xr-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    #aframe-root {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    #target-status {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: 2px solid rgba(255, 255, 255, 0.15);
    }
  </style>
</head>

<body>
<script src="bundle.js"></script>

  <div id="start-overlay">
    <h2>AR Illustrations</h2>
    <p>This experience requires camera access.</p>
    <button id="start-button">Start Experience</button>
  </div>

  <canvas id="xr-canvas"></canvas>

  <div id="target-status">Waiting to start...</div>

</body>

</html>
