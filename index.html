<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>AR Illustrations</title>
  <meta itemprop="name" content="AR Illustrations">
  <meta name="twitter:title" content="AR Illustrations">
  <meta property="og:title" content="AR Illustrations">
  <meta property="og:site_name" content="AR Illustrations">
  <meta name="description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world.">
  <meta itemprop="description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world.">
  <meta property="og:description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world.">
  <meta name="twitter:description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world.">
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam">
  </script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Splash Screen */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    #startBtn {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 16px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    #startBtn:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <!-- Splash Screen -->
  <div id="splash">
    <h2>Welcome</h2>
    <button id="startBtn">Start AR</button>
  </div>

  <script>
    const splash = document.getElementById('splash');
    const startBtn = document.getElementById('startBtn');

    startBtn.addEventListener('click', () => {
      // Hide splash
      splash.style.display = 'none';

      // Start AR (trigger XR pipeline)
      window.dispatchEvent(new Event('xrloaded'));
    });
  </script>

  <!-- Your AR bundle -->
  <script src="bundle.js"></script>

</body>
</html>
