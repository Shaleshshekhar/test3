<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AR Illustrations</title><link rel="icon" href="/favicon.ico"><link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png"><link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png"><link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png"><link rel="manifest" href="./assets/site.webmanifest"><meta name="theme-color" content="#D89A5B"><script crossorigin="anonymous" src="./external/runtime/runtime.js"></script><script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script><style>html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    /* ================= SPLASH ================= */

    #start-overlay {
      position: absolute;
      inset: 0;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #F6E3C5;
    }

    /* ===== ORGANIC GRADIENT ===== */

    #gradient-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    #gradient-bg svg {
      width: 120%;
      height: 120%;
    }

    .shape {
      transform-origin: center;
      opacity: 0.8;
    }

    .shape1 {
      animation: move1 28s infinite linear alternate;
    }

    .shape2 {
      animation: move2 35s infinite linear alternate;
    }

    .shape3 {
      animation: move3 40s infinite linear alternate;
    }

    @keyframes move1 {
      0%   { transform: translate(-20vw, -10vh) scale(1) rotate(0deg); }
      25%  { transform: translate(30vw, -20vh) scale(1.3) rotate(90deg); }
      50%  { transform: translate(40vw, 30vh) scale(0.9) rotate(180deg); }
      75%  { transform: translate(-10vw, 40vh) scale(1.2) rotate(270deg); }
      100% { transform: translate(-20vw, -10vh) scale(1) rotate(360deg); }
    }

    @keyframes move2 {
      0%   { transform: translate(30vw, 20vh) scale(1.2) rotate(0deg); }
      30%  { transform: translate(-40vw, 10vh) scale(0.8) rotate(120deg); }
      60%  { transform: translate(-20vw, -30vh) scale(1.3) rotate(240deg); }
      100% { transform: translate(30vw, 20vh) scale(1.2) rotate(360deg); }
    }

    @keyframes move3 {
      0%   { transform: translate(0vw, 40vh) scale(1) rotate(0deg); }
      20%  { transform: translate(40vw, -20vh) scale(1.4) rotate(70deg); }
      50%  { transform: translate(-30vw, -10vh) scale(0.8) rotate(200deg); }
      80%  { transform: translate(20vw, 30vh) scale(1.2) rotate(300deg); }
      100% { transform: translate(0vw, 40vh) scale(1) rotate(360deg); }
    }

    /* ===== GLASS EFFECT ===== */

    #glass-layer {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(80px);
      background: rgba(255,255,255,0.08);
      z-index: 1;
    }

    /* ===== CENTER ART ===== */

    #center-art {
      position: absolute;
      height: 100vh;
      width: auto;
      z-index: 2;
      pointer-events: none;
    }

    /* ===== BUTTON ===== */

    #start-button {
      position: absolute;
      bottom: 60px;
      z-index: 3;
      padding: 16px 36px;
      font-size: 18px;
      cursor: pointer;
      background: linear-gradient(135deg, #E6A85C, #C97A3D);
      color: #fff;
      border: none;
      border-radius: 999px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25),
                  inset 0 0 10px rgba(255,255,255,0.2);
      transition: transform 0.2s ease;
    }

    #start-button:active {
      transform: scale(0.95);
    }

    /* ===== FLASH TRANSITION ===== */

    #flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      z-index: 5;
      transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #flash.active {
      opacity: 1;
    }

    /* ================= AR ================= */

    #xr-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }</style></head><body><script src="bundle.js"></script><div id="start-overlay"><div id="gradient-bg"><svg viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice"><defs><filter id="blur"><feGaussianBlur stdDeviation="80"/></filter><radialGradient id="grad1"><stop offset="0%" stop-color="#FFD27A"><animate attributeName="stop-color" values="#FFD27A;#FFE5A3;#FFC56A;#FFD27A" dur="18s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#E6A85C"/></radialGradient><radialGradient id="grad2"><stop offset="0%" stop-color="#F6C28B"><animate attributeName="stop-color" values="#F6C28B;#FFB86B;#E6A85C;#F6C28B" dur="22s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#D89A5B"/></radialGradient><radialGradient id="grad3"><stop offset="0%" stop-color="#FFE0A3"><animate attributeName="stop-color" values="#FFE0A3;#FFD27A;#FFC56A;#FFE0A3" dur="20s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#C97A3D"/></radialGradient></defs><g filter="url(#blur)"><path class="shape shape1" d="M300,200 C400,100 600,150 650,300 C700,450 550,600 400,650 C250,700 150,550 150,400 C150,300 200,250 300,200 Z" fill="url(#grad1)"/><path class="shape shape2" d="M500,100 C650,150 750,300 700,450 C650,600 500,700 350,650 C200,600 150,450 200,300 C250,200 350,100 500,100 Z" fill="url(#grad2)"/><path class="shape shape3" d="M200,300 C250,200 400,150 500,250 C600,350 550,500 400,550 C250,600 150,500 150,400 C150,350 170,320 200,300 Z" fill="url(#grad3)"/></g></svg></div><div id="glass-layer"></div><img id="center-art" src="./assets/splash-art.png" alt="Artwork"> <button id="start-button">Start AR</button><div id="flash"></div></div><canvas id="xr-canvas"></canvas><script>const overlay = document.getElementById("start-overlay");
  const button = document.getElementById("start-button");
  const flash = document.getElementById("flash");

  button.addEventListener("click", async () => {

    // Unlock audio
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      await audioCtx.resume();
    } catch(e) {}

    // ✅ KEY FIX: resume XR camera
    try {
      if (window.XR8 && XR8.XrController) {
        XR8.XrController.resume();   // <-- THIS is the important call
      }
    } catch (e) {
      console.warn("XR resume failed", e);
    }

    // Flash transition
    flash.classList.add("active");

    setTimeout(() => {
      overlay.style.opacity = "0";
      overlay.style.transition = "opacity 0.5s ease";
    }, 300);

    setTimeout(() => {
      overlay.remove();
    }, 1000);

  });</script></body></html>
