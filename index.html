<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>AR Illustrations</title>
  <meta itemprop="name" content="AR Illustrations">
  <meta name="twitter:title" content="AR Illustrations">
  <meta property="og:title" content="AR Illustrations">
  <meta property="og:site_name" content="AR Illustrations">
  <meta name="description" content="Bring your illustrations to life with immersive augmented reality experiences.">
  <meta itemprop="description" content="Bring your illustrations to life with immersive augmented reality experiences.">
  <meta property="og:description" content="Bring your illustrations to life with immersive augmented reality experiences.">
  <meta name="twitter:description" content="Bring your illustrations to life with immersive augmented reality experiences.">
  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <link rel="manifest" href="./assets/site.webmanifest">
  <meta name="theme-color" content="#D89A5B">

  <!-- XR -->
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ===== SPLASH ===== */

    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #F6E3C5;
      pointer-events: auto;
    }

    /* Gradient */
    #gradient-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    #gradient-bg svg {
      width: 120%;
      height: 120%;
    }

    .shape {
      transform-origin: center;
      opacity: 0.8;
    }

    .shape1 { animation: move1 28s infinite linear alternate; }
    .shape2 { animation: move2 35s infinite linear alternate; }
    .shape3 { animation: move3 40s infinite linear alternate; }

    @keyframes move1 {
      0% { transform: translate(-20vw,-10vh) scale(1) rotate(0); }
      50% { transform: translate(40vw,30vh) scale(1.3) rotate(180deg); }
      100% { transform: translate(-20vw,-10vh) scale(1) rotate(360deg); }
    }

    @keyframes move2 {
      0% { transform: translate(30vw,20vh) scale(1.2); }
      50% { transform: translate(-40vw,-30vh) scale(0.8); }
      100% { transform: translate(30vw,20vh) scale(1.2); }
    }

    @keyframes move3 {
      0% { transform: translate(0,40vh) scale(1); }
      50% { transform: translate(40vw,-20vh) scale(1.4); }
      100% { transform: translate(0,40vh) scale(1); }
    }

    #glass-layer {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(80px);
      background: rgba(255,255,255,0.08);
      z-index: 1;
    }

    #center-art {
      position: absolute;
      z-index: 2;
      pointer-events: none;

      /* Default: mobile first */
      width: 100%;
      height: auto;
    }

    /* For wider screens (tablets + desktop) */
    @media (min-aspect-ratio: 1/1) {
      #center-art {
        width: auto;
        height: 100vh;
      }
    }

    #start-button {
      position: absolute;
      bottom: 60px;
      z-index: 999999; /* VERY IMPORTANT */
      padding: 16px 36px;
      font-size: 18px;
      background: linear-gradient(135deg, #E6A85C, #C97A3D);
      color: #fff;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      pointer-events: auto;
    }

    #flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      z-index: 100000;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    #flash.active {
      opacity: 1;
    }

    /* ===== XR ===== */

    #xr-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none !important;
    }
  </style>
</head>

<body>

  <!-- XR bundle -->
  <script src="bundle.js"></script>

  <!-- SPLASH -->
  <div id="start-overlay">

    <div id="gradient-bg">
      <svg viewBox="0 0 800 800">
        <defs>
          <filter id="blur">
            <feGaussianBlur stdDeviation="80"/>
          </filter>

          <radialGradient id="g1">
            <stop offset="0%" stop-color="#FFD27A"/>
            <stop offset="100%" stop-color="#E6A85C"/>
          </radialGradient>

          <radialGradient id="g2">
            <stop offset="0%" stop-color="#F6C28B"/>
            <stop offset="100%" stop-color="#D89A5B"/>
          </radialGradient>

          <radialGradient id="g3">
            <stop offset="0%" stop-color="#FFE0A3"/>
            <stop offset="100%" stop-color="#C97A3D"/>
          </radialGradient>
        </defs>

        <g filter="url(#blur)">
          <path class="shape shape1" fill="url(#g1)"
            d="M300,200 C400,100 600,150 650,300 C700,450 550,600 400,650 C250,700 150,550 150,400 Z"/>
          <path class="shape shape2" fill="url(#g2)"
            d="M500,100 C650,150 750,300 700,450 C650,600 500,700 350,650 C200,600 150,450 200,300 Z"/>
          <path class="shape shape3" fill="url(#g3)"
            d="M200,300 C250,200 400,150 500,250 C600,350 550,500 400,550 C250,600 150,500 150,400 Z"/>
        </g>
      </svg>
    </div>

    <div id="glass-layer"></div>

    <img id="center-art" src="./assets/splash-art.png" />

    <button id="start-button">Start AR</button>

    <div id="flash"></div>

  </div>

  <canvas id="xr-canvas"></canvas>

  <!-- SCRIPT -->
  <script>
    window.addEventListener("load", () => {

      const button = document.getElementById("start-button");
      const overlay = document.getElementById("start-overlay");
      const flash = document.getElementById("flash");

      button.onclick = async function () {

        console.log("CLICK WORKING");

        // unlock audio
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          await ctx.resume();
        } catch(e){}

        // resume XR
        try {
          if (window.XR8 && XR8.XrController) {
            XR8.XrController.resume();
          }
        } catch(e){}

        // visual transition
        flash.classList.add("active");

        setTimeout(() => {
          overlay.style.opacity = "0";
        }, 300);

        setTimeout(() => {
          overlay.remove();
        }, 900);

      };

    });
  </script>

</body>
</html>
